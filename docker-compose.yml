services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  kong-baseline:
    image: kong/kong-gateway:3.10.0.10
    container_name: kong-baseline
    depends_on:
      redis:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_LICENSE_PATH: /etc/kong/license/license.json
      KONG_LOG_LEVEL: debug
      KONG_NGINX_WORKER_PROCESSES: "2"
    volumes:
      - ./kong.yml:/kong/kong.yml:ro
      - ./license:/etc/kong/license:ro
    ports:
      - "8000:8000"
      - "8001:8001"

  kong-filtered:
    build: .
    container_name: kong-filtered
    depends_on:
      redis:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_LICENSE_PATH: /etc/kong/license/license.json
      KONG_LOG_LEVEL: debug
      KONG_NGINX_WORKER_PROCESSES: "2"
      KONG_NGINX_DAEMON: "off"
    volumes:
      - ./kong.yml:/kong/kong.yml:ro
      - ./license:/etc/kong/license:ro
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        kong prepare -p /usr/local/kong --nginx-conf /etc/kong/custom_nginx.template
        ln -sf /dev/stdout /usr/local/kong/logs/access.log
        ln -sf /dev/stdout /usr/local/kong/logs/admin_access.log
        ln -sf /dev/stderr /usr/local/kong/logs/error.log
        exec /usr/local/openresty/nginx/sbin/nginx -p /usr/local/kong -c nginx.conf
    ports:
      - "8010:8000"
      - "8011:8001"
